<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico PDF v3</title>
<style>
body{background:#0A0A0A;color:#F0F0E8;font-family:monospace;padding:16px;max-width:700px;margin:0 auto}
h1{color:#CBFF4D;font-size:18px;margin-bottom:8px}
p{font-size:12px;color:#888;margin-bottom:12px}
button{background:#CBFF4D;color:#000;border:none;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;width:100%;margin-bottom:8px}
#output{background:#111;border:1px solid #2A2A2A;border-radius:8px;padding:12px;white-space:pre-wrap;font-size:11px;max-height:80vh;overflow-y:auto;line-height:1.6}
.ok{color:#CBFF4D}.err{color:#F87171}.info{color:#60A5FA}.warn{color:#FFB84D}
</style>
</head>
<body>
<h1>🔍 Diagnóstico PDF v3</h1>
<p>Lê o texto bruto do PDF sem descompressão</p>
<button onclick="pickFile()">Seleccionar PDF</button>
<div id="output">Aguarda ficheiro...</div>
<script>
function pickFile(){
  const inp=document.createElement('input');
  inp.type='file';inp.accept='.pdf,application/pdf';
  inp.onchange=e=>{
    document.getElementById('output').innerHTML='';
    const file=e.target.files[0];
    if(!file)return;
    log('info','Ficheiro: '+file.name+' ('+Math.round(file.size/1024)+'KB)');
    readPDF(file);
  };
  inp.click();
}

async function readPDF(file){
  const reader=new FileReader();
  reader.onload=async e=>{
    const bytes=new Uint8Array(e.target.result);
    log('info','Bytes: '+bytes.length);

    // Converte para string
    let raw='';
    for(let i=0;i<bytes.length;i++) raw+=String.fromCharCode(bytes[i]);

    // Conta estruturas
    const nStreams=(raw.match(/\bstream\b/g)||[]).length;
    const nFlate=(raw.match(/FlateDecode/g)||[]).length;
    const nBT=(raw.match(/\bBT\b/g)||[]).length;
    const nTj=(raw.match(/\bTj\b/g)||[]).length;
    log('info','stream: '+nStreams+' | FlateDecode: '+nFlate+' | BT: '+nBT+' | Tj: '+nTj);

    // Tenta descomprimir todos os streams FlateDecode
    log('info','A descomprimir streams...');
    const allText=[];
    let si=0;
    let found=0;
    while(true){
      // Encontra próximo stream
      const sPos=raw.indexOf('stream',si);
      if(sPos<0)break;
      // Verifica se é FlateDecode
      const before=raw.substring(Math.max(0,sPos-300),sPos);
      const isFlate=before.indexOf('FlateDecode')>=0;
      // Encontra fim do 'stream' keyword e início dos dados
      let dataStart=sPos+6;
      while(dataStart<raw.length&&(raw[dataStart]==='\r'||raw[dataStart]==='\n')) dataStart++;
      // Encontra endstream
      const ePos=raw.indexOf('endstream',dataStart);
      if(ePos<0){si=sPos+6;continue;}
      const dataLen=ePos-dataStart;
      if(dataLen>0&&dataLen<500000&&isFlate){
        found++;
        try{
          const data=bytes.slice(dataStart,ePos);
          log('info','Stream #'+found+' a descomprimir ('+dataLen+' bytes)...');
          const text=await decompress(data);
          if(text&&text.length>10){
            log('ok','Stream #'+found+' OK: '+text.length+' chars');
            allText.push(text);
            // Mostra primeiros 200 chars
            log('warn','  Preview: '+text.slice(0,200).replace(/\n/g,' ↵ '));
          } else {
            log('err','Stream #'+found+' falhou descompressão');
          }
        }catch(e2){log('err','Stream #'+found+' erro: '+e2.message);}
      }
      si=ePos+9;
    }

    log('info','Streams FlateDecode encontrados: '+found);
    log('info','Streams descomprimidos com sucesso: '+allText.length);

    if(allText.length===0){
      log('err','Nenhum stream descomprimido!');
      // Tenta extrair texto plano
      log('info','A tentar extracção de texto plano...');
      const tjMatches=[...raw.matchAll(/\(([^\)]{1,200})\)\s*Tj/g)];
      log('info','Strings Tj encontradas: '+tjMatches.length);
      tjMatches.slice(0,30).forEach((m,i)=>log('warn',i+': '+m[1]));
      return;
    }

    // Junta todo o texto descomprimido
    const combined=allText.join('\n');
    const lines=combined.split('\n').map(l=>l.trim()).filter(l=>l.length>0);
    log('ok','');
    log('ok','TOTAL LINHAS: '+lines.length);
    log('ok','=== PRIMEIRAS 100 LINHAS ===');
    lines.slice(0,100).forEach((l,i)=>{
      const isArt=/^\([ABCNS]\)\s/.test(l)||/\bTj\b|\bTJ\b/.test(l)||(l.length>2&&l.length<200);
      log('warn',i.toString().padStart(3)+': '+l.slice(0,120));
    });

    // Verifica padrão Continente
    const artLines=lines.filter(l=>/^\([ABCNS]\)\s/.test(l));
    log('info','');
    log('info','Linhas (A/B/C): '+artLines.length);
    artLines.slice(0,5).forEach(l=>log('ok','  '+l));

    // Verifica padrão Tj
    const tjLines=lines.filter(l=>l.includes(') Tj')||l.includes(')Tj'));
    log('info','Linhas com Tj: '+tjLines.length);
    tjLines.slice(0,10).forEach(l=>log('ok','  '+l));
  };
  reader.readAsArrayBuffer(file);
}

async function decompress(data){
  // Tenta vários modos
  const variants=[
    {mode:'deflate-raw',data:data[0]===0x78?data.slice(2):data},
    {mode:'deflate-raw',data:data},
    {mode:'deflate',data:data},
    {mode:'deflate-raw',data:data[0]===0x78&&data[1]===0x9c?data.slice(2):data},
  ];
  for(const {mode,data:d} of variants){
    try{
      const blob=new Blob([d]);
      const ds=new DecompressionStream(mode);
      const stream=blob.stream().pipeThrough(ds);
      const reader=stream.getReader();
      const chunks=[];let total=0;
      try{
        while(true){
          const{done,value}=await reader.read();
          if(done)break;
          chunks.push(value);total+=value.length;
          if(total>2000000)break;
        }
      }catch(_){}
      if(!chunks.length)continue;
      const out=new Uint8Array(total);
      let off=0;for(const c of chunks){out.set(c,off);off+=c.length;}
      let text='';for(let i=0;i<out.length;i++)text+=String.fromCharCode(out[i]);
      if(text.length>20)return text;
    }catch(_){}
  }
  return null;
}

const out=document.getElementById('output');
function log(type,msg){
  const d=document.createElement('div');d.className=type;d.textContent=msg;
  out.appendChild(d);out.scrollTop=out.scrollHeight;
}
</script>
</body>
</html>
