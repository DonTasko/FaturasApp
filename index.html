<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>StockScan - Leitor QR</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0C0D10;color:#ECEDF5;font-family:-apple-system,sans-serif;max-width:480px;margin:0 auto}
.header{padding:14px 16px;display:flex;justify-content:space-between;background:#13141A;border-bottom:1px solid #2A2B3A}
.logo{display:flex;align-items:center;gap:9px}
.logo-box{width:32px;height:32px;background:#4ADE80;border-radius:9px;display:flex;align-items:center;justify-content:center}
.btn{background:#1B1C24;border:1px solid #2A2B3A;border-radius:10px;padding:10px 16px;color:#ECEDF5;cursor:pointer}
.btn-primary{background:#4ADE80;color:#081A0D}
.cam-container{position:relative;width:100%;background:#000;min-height:300px}
video{width:100%;display:block}
.cam-overlay{position:absolute;top:0;left:0;right:0;bottom:0;border:2px solid #4ADE80;border-radius:12px;margin:20px;pointer-events:none}
.qr-guide{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:200px;height:200px;border:2px solid #4ADE80;border-radius:12px;box-shadow:0 0 0 999px rgba(0,0,0,0.5);pointer-events:none}
.status{padding:12px;text-align:center;font-size:13px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#22232E;border-radius:12px;padding:10px 16px;font-size:12px;display:none;z-index:100}
.form-container{padding:16px}
input,select{background:#1B1C24;border:1px solid #2A2B3A;border-radius:10px;padding:12px;color:#ECEDF5;width:100%;margin-bottom:12px}
.form-row{display:flex;gap:12px;margin-bottom:12px}
.form-row .field{flex:1}
button:active{transform:scale(0.97)}
</style>
</head>
<body>

<div class="header">
  <div class="logo"><div class="logo-box">📦</div><span style="font-weight:800">StockScan</span></div>
  <div id="user-info" style="display:none;align-items:center;gap:8px">
    <span id="user-email" style="font-size:11px;color:#9496B0"></span>
    <button class="btn" style="padding:6px 10px" onclick="logout()">🚪</button>
  </div>
</div>

<div id="login-screen" style="padding:24px">
  <div style="background:#13141A;border-radius:24px;padding:24px">
    <h2 style="margin-bottom:20px">🔐 StockScan Cloud</h2>
    <input type="email" id="login-email" placeholder="Email">
    <input type="password" id="login-password" placeholder="Password">
    <button class="btn btn-primary" style="width:100%;margin-bottom:8px" onclick="login()">Entrar</button>
    <button class="btn" style="width:100%" onclick="signup()">Criar conta</button>
  </div>
</div>

<div id="app-content" style="display:none">
  <div class="cam-container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" style="display:none"></canvas>
    <div class="qr-guide"></div>
  </div>
  <div class="status" id="status">📷 Aponte para o QR Code (canto superior direito da fatura)</div>
  
  <div style="display:flex;gap:8px;padding:0 16px;margin-bottom:16px">
    <button class="btn" style="flex:1" onclick="switchCamera()">🔄 Trocar câmara</button>
    <button class="btn btn-primary" style="flex:1" onclick="startScanning()">🔍 Ler QR</button>
    <button class="btn" style="flex:1" onclick="openManualForm()">✏️ Manual</button>
  </div>
  
  <div class="form-container" id="form-container" style="display:none">
    <h3 id="form-title" style="margin-bottom:16px">Nova Fatura</h3>
    <input type="text" id="supplier" placeholder="Fornecedor">
    <div class="form-row">
      <div class="field"><input type="text" id="nif" placeholder="NIF"></div>
      <div class="field"><input type="text" id="num" placeholder="Nº Fatura"></div>
    </div>
    <div class="form-row">
      <div class="field"><input type="date" id="date"></div>
      <div class="field"><input type="number" id="total" step="0.01" placeholder="Total (€)"></div>
    </div>
    <div class="form-row">
      <div class="field"><input type="number" id="vat" step="0.01" placeholder="IVA (€)"></div>
      <div class="field"><input type="text" id="atcud" placeholder="ATCUD"></div>
    </div>
    <button class="btn btn-primary" style="width:100%" onclick="saveInvoice()">✓ Guardar Fatura</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// SUPABASE
const SUPABASE_URL = 'https://clhhnzgjcrxezxhvguiy.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_L8_BSQnaKtl0wdlcA645vA__HHhozVn';
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let stream = null;
let scanning = false;
let scanInterval = null;
let currentFacing = 'environment';

// Elementos
const loginScreen = document.getElementById('login-screen');
const appContent = document.getElementById('app-content');
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const statusDiv = document.getElementById('status');
const formContainer = document.getElementById('form-container');
const formTitle = document.getElementById('form-title');

// ============================================================
// AUTENTICAÇÃO
// ============================================================
async function login() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  if (!email || !password) { toast('Preencha email e password'); return; }
  const { error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) { toast('Erro: ' + error.message); return; }
  await loadUser();
}
async function signup() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  if (!email || !password) { toast('Preencha email e password'); return; }
  const { error } = await supabase.auth.signUp({ email, password });
  if (error) { toast('Erro: ' + error.message); return; }
  toast('✅ Conta criada! Verifique o email.');
}
async function logout() {
  await supabase.auth.signOut();
  currentUser = null;
  loginScreen.style.display = 'flex';
  appContent.style.display = 'none';
  stopCamera();
}
async function loadUser() {
  const { data: { user } } = await supabase.auth.getUser();
  if (user) {
    currentUser = user;
    loginScreen.style.display = 'none';
    appContent.style.display = 'block';
    document.getElementById('user-info').style.display = 'flex';
    document.getElementById('user-email').textContent = user.email.split('@')[0];
    startCamera();
  }
}

// ============================================================
// CÂMARA E QR CODE
// ============================================================
async function startCamera() {
  stopCamera();
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { exact: currentFacing }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    await video.play();
    statusDiv.innerHTML = '📷 Câmara ativa. Clique em "Ler QR" e aponte para o código.';
  } catch(e) {
    // Fallback
    stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
    await video.play();
  }
}
function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
}
function switchCamera() {
  currentFacing = currentFacing === 'environment' ? 'user' : 'environment';
  startCamera();
}
function startScanning() {
  if (scanning) return;
  scanning = true;
  statusDiv.innerHTML = '🔍 A ler QR Code... mantenha estável';
  
  if (scanInterval) clearInterval(scanInterval);
  scanInterval = setInterval(() => {
    if (!video.videoWidth || !video.videoHeight) return;
    
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    
    // Tenta com várias inversões
    let code = jsQR(imageData.data, canvas.width, canvas.height, { inversionAttempts: 'attemptBoth' });
    if (!code) {
      // Tenta com imagem invertida
      const inverted = new Uint8ClampedArray(imageData.data.length);
      for (let i = 0; i < imageData.data.length; i += 4) {
        inverted[i] = 255 - imageData.data[i];
        inverted[i+1] = 255 - imageData.data[i+1];
        inverted[i+2] = 255 - imageData.data[i+2];
        inverted[i+3] = imageData.data[i+3];
      }
      code = jsQR(inverted, canvas.width, canvas.height, { inversionAttempts: 'attemptBoth' });
    }
    
    if (code) {
      clearInterval(scanInterval);
      scanInterval = null;
      scanning = false;
      processQRData(code.data);
    }
  }, 500);
}

function processQRData(qrString) {
  console.log('QR lido:', qrString);
  const data = parseATQR(qrString);
  if (!data.nif && !data.num && !data.total) {
    toast('❌ QR inválido. Tente novamente.');
    statusDiv.innerHTML = '❌ QR não reconhecido. Tente outra foto.';
    return;
  }
  
  toast('✅ QR lido com sucesso!');
  statusDiv.innerHTML = '✅ QR detetado! Preencha os restantes campos.';
  
  // Preenche formulário com dados do QR
  document.getElementById('nif').value = data.nif || '';
  document.getElementById('num').value = data.num || '';
  document.getElementById('date').value = data.date || new Date().toISOString().slice(0,10);
  document.getElementById('total').value = data.total || '';
  document.getElementById('vat').value = data.vat || '';
  document.getElementById('atcud').value = data.atcud || '';
  
  formTitle.textContent = 'Nova Fatura (QR lido)';
  formContainer.style.display = 'block';
}

function parseATQR(raw) {
  const r = {};
  const pairs = raw.split('*');
  for (const pair of pairs) {
    const i = pair.indexOf(':');
    if (i < 0) continue;
    const k = pair.slice(0, i).trim();
    const v = pair.slice(i + 1).trim();
    if (k === 'A') r.nif = v;
    else if (k === 'B') r.nifClient = v;
    else if (k === 'F' && v.length === 8) r.date = v.slice(0,4)+'-'+v.slice(4,6)+'-'+v.slice(6,8);
    else if (k === 'G') r.num = v;
    else if (k === 'H') r.atcud = v;
    else if (k === 'N') r.vat = parseFloat(v) || 0;
    else if (k === 'O') r.total = parseFloat(v) || 0;
  }
  return r;
}

function openManualForm() {
  formTitle.textContent = 'Nova Fatura (Manual)';
  document.getElementById('supplier').value = '';
  document.getElementById('nif').value = '';
  document.getElementById('num').value = '';
  document.getElementById('date').value = new Date().toISOString().slice(0,10);
  document.getElementById('total').value = '';
  document.getElementById('vat').value = '';
  document.getElementById('atcud').value = '';
  formContainer.style.display = 'block';
  statusDiv.innerHTML = '📝 Preencha os dados da fatura';
}

async function saveInvoice() {
  if (!currentUser) return;
  
  const inv = {
    id: Date.now().toString(36) + Math.random().toString(36).substr(2, 4),
    supplier: document.getElementById('supplier').value,
    nif: document.getElementById('nif').value,
    num: document.getElementById('num').value,
    date: document.getElementById('date').value,
    total: parseFloat(document.getElementById('total').value) || 0,
    vat: parseFloat(document.getElementById('vat').value) || 0,
    atcud: document.getElementById('atcud').value,
    photo: null,
    status: 'pendente',
    user_id: currentUser.id,
    items: []
  };
  
  const { error } = await supabase.from('invoices').insert(inv);
  if (error) { toast('Erro ao guardar: ' + error.message); return; }
  
  toast('✅ Fatura guardada!');
  formContainer.style.display = 'none';
  document.getElementById('supplier').value = '';
  
  // Opcional: limpar campos
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

// Verificar sessão existente
supabase.auth.getSession().then(({ data: { session } }) => {
  if (session?.user) loadUser();
  else {
    loginScreen.style.display = 'flex';
    appContent.style.display = 'none';
  }
});
</script>
</body>
</html>
