<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>StockScan Pro</title>
<style>
/* ... Mantive os teus estilos originais ... */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0C0D10;--s1:#13141A;--s2:#1B1C24;--s3:#22232E;
  --b:#2A2B3A;--b2:#383A4E;
  --t:#ECEDF5;--t2:#9496B0;--t3:#55566E;
  --acc:#4ADE80;--acc2:#22C55E;--acc-dim:#4ADE8015;--acc-glow:#4ADE8040;
  --warn:#FACC15;--warn-dim:#FACC1512;
  --red:#F87171;--red-dim:#F8717112;
  --blue:#60A5FA;--blue-dim:#60A5FA12;
  --purple:#C084FC;--purple-dim:#C084FC12;
  --mono:monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--t);font-family:var(--sans);display:flex;flex-direction:column;max-width:480px;margin:0 auto}
header{flex-shrink:0;padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-bottom:1px solid var(--b);z-index:30}
.logo{display:flex;align-items:center;gap:9px}
.logo-box{width:32px;height:32px;background:var(--acc);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 16px var(--acc-glow);flex-shrink:0}
.logo h1{font-size:16px;font-weight:800;letter-spacing:-.4px}
.logo h1 span{color:var(--acc)}
.hdr-right{display:flex;gap:7px}
.icon-btn{width:34px;height:34px;border-radius:9px;background:var(--s2);border:1px solid var(--b);color:var(--t2);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:80px}
.page{display:none;padding:14px 14px 6px;flex-direction:column;gap:11px;animation:fadein .2s ease}
.page.on{display:flex}
@keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--s1);border:1px solid var(--b);border-radius:14px;padding:13px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 16px;border-radius:11px;font-size:13px;font-weight:700;cursor:pointer;border:none}
.btn-prim{background:var(--acc);color:#081A0D}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(5px);z-index:100;display:none;align-items:flex-end;justify-content:center}
.overlay.on{display:flex}
.sheet{background:var(--s1);border:1px solid var(--b);border-radius:22px 22px 0 0;width:100%;max-width:480px;max-height:94vh;overflow-y:auto;padding-bottom:20px}
/* Estilos Camera */
#cam-wrap{position:fixed;inset:0;background:#000;z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center}
#cam-wrap.on{display:flex}
#cam-video{width:100%;max-width:480px}
.cam-shutter{width:70px;height:70px;border-radius:50%;background:#fff;border:5px solid rgba(255,255,255,0.4);margin-top:20px}
#ocr-loading{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;color:#fff}
.spinner{width:40px;height:40px;border:4px solid #fff;border-top-color:var(--acc);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>

<script src="https://unpkg.com/tesseract.js@5.0.3/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-box">📦</div>
    <h1>Stock<span>Scan</span></h1>
  </div>
  <div class="hdr-right">
    <div class="icon-btn" onclick="openOCRScan()">📷</div>
  </div>
</header>

<div class="main">
  <div class="page on" id="p-dash">
    <div class="card">
        <p>Bem-vindo ao StockScan. Use a câmara para registar faturas.</p>
        <button class="btn btn-prim" style="width:100%; margin-top:15px" onclick="openOCRScan()">Digitalizar Fatura</button>
    </div>
    <div id="lista-faturas" style="margin-top:10px"></div>
  </div>
</div>

<div id="cam-wrap">
  <div style="position:absolute; top:20px; right:20px; z-index:210">
    <button class="btn" style="background:rgba(0,0,0,0.5); color:#fff" onclick="closeCam()">✕</button>
  </div>
  <video id="cam-video" autoplay playsinline></video>
  <canvas id="cam-canvas" style="display:none"></canvas>
  <div id="cam-hint" style="color:#fff; margin-top:10px">Alinhe o QR Code ou a lista de artigos</div>
  <button class="cam-shutter" onclick="captureAndProcess()"></button>
</div>

<div id="ocr-loading">
  <div class="spinner"></div>
  <p style="margin-top:15px">A ler QR Code e Artigos...</p>
  <small style="color:var(--t3)">Isto pode demorar até 10 segundos</small>
</div>

<script>
let stream = null;

async function openOCRScan() {
    const wrap = document.getElementById('cam-wrap');
    wrap.classList.add('on');
    try {
        stream = await navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } 
        });
        document.getElementById('cam-video').srcObject = stream;
    } catch (err) {
        alert("Erro ao aceder à câmara.");
        closeCam();
    }
}

function closeCam() {
    if(stream) stream.getTracks().forEach(t => t.stop());
    document.getElementById('cam-wrap').classList.remove('on');
}

async function captureAndProcess() {
    const video = document.getElementById('cam-video');
    const canvas = document.getElementById('cam-canvas');
    const ctx = canvas.getContext('2d');
    const loading = document.getElementById('ocr-loading');

    // Ajusta canvas para alta resolução
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);

    loading.style.display = 'flex';

    try {
        // 1. Tentar ler QR Code (jsQR)
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        let dadosFiscais = {};
        
        if (code) {
            console.log("QR Code detectado:", code.data);
            dadosFiscais = parseATQRCode(code.data);
        }

        // 2. Tentar ler Artigos (Tesseract OCR)
        // Convertemos para DataURL para o Tesseract processar
        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
        const worker = await Tesseract.createWorker('por');
        const { data: { text } } = await worker.recognize(dataUrl);
        await worker.terminate();

        const artigos = parseArtigos(text);

        // 3. Resultado Final
        loading.style.display = 'none';
        closeCam();

        // Aqui você chamaria sua função de abrir o formulário com os dados
        alert(`Processado!\nNIF: ${dadosFiscais.nif || 'Não lido'}\nArtigos encontrados: ${artigos.length}`);
        console.log("Resultado OCR:", artigos);

    } catch (err) {
        console.error(err);
        loading.style.display = 'none';
        alert("Falha no processamento da imagem.");
    }
}

// Extrai dados do formato padrão QR Code Portugal (AT)
function parseATQRCode(data) {
    const parts = data.split('*');
    const info = {};
    parts.forEach(p => {
        const [key, val] = p.split(':');
        if (key === 'A') info.nif = val;
        if (key === 'G') info.id = val;
        if (key === 'I1') info.total = val;
    });
    return info;
}

// Lógica para filtrar nomes de produtos e preços no texto
function parseArtigos(text) {
    const lines = text.split('\n');
    const found = [];
    // Regex para procurar valores monetários no fim da linha (ex: 1,50 ou 12.00)
    const priceRegex = /(\d+[\.,]\d{2})$/;

    lines.forEach(line => {
        const match = line.match(priceRegex);
        if (match && line.trim().length > 5) {
            found.push({
                nome: line.replace(match[0], '').trim(),
                preco: match[1].replace(',', '.')
            });
        }
    });
    return found;
}
</script>

</body>
</html>
