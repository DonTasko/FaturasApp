<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>StockScan</title>

<script src="https://unpkg.com/tesseract.js@5.0.3/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

<style>
/* MANTIDOS TODOS OS TEUS ESTILOS ORIGINAIS */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0C0D10;--s1:#13141A;--s2:#1B1C24;--s3:#22232E;
  --b:#2A2B3A;--b2:#383A4E;
  --t:#ECEDF5;--t2:#9496B0;--t3:#55566E;
  --acc:#4ADE80;--acc2:#22C55E;--acc-dim:#4ADE8015;--acc-glow:#4ADE8040;
  --warn:#FACC15;--warn-dim:#FACC1512;
  --red:#F87171;--red-dim:#F8717112;
  --blue:#60A5FA;--blue-dim:#60A5FA12;
  --purple:#C084FC;--purple-dim:#C084FC12;
  --mono:monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--t);font-family:var(--sans);display:flex;flex-direction:column;max-width:480px;margin:0 auto}
header{flex-shrink:0;padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-bottom:1px solid var(--b);z-index:30}
.logo{display:flex;align-items:center;gap:9px}
.logo-box{width:32px;height:32px;background:var(--acc);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 16px var(--acc-glow);flex-shrink:0}
.logo h1{font-size:16px;font-weight:800;letter-spacing:-.4px}
.logo h1 span{color:var(--acc)}
.hdr-right{display:flex;gap:7px}
.icon-btn{width:34px;height:34px;border-radius:9px;background:var(--s2);border:1px solid var(--b);color:var(--t2);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.icon-btn:active{background:var(--s3);transform:scale(.93)}
.main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:80px}
.bot-nav{flex-shrink:0;display:flex;background:var(--s1);border-top:1px solid var(--b);padding-bottom:env(safe-area-inset-bottom)}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 4px 8px;background:none;border:none;cursor:pointer;color:var(--t3);font-family:var(--sans);transition:.12s}
.bn.on{color:var(--acc)}
.bn-ic{font-size:18px;line-height:1}
.bn-lbl{font-size:9px;font-weight:700;letter-spacing:.4px}
.page{display:none;padding:14px 14px 6px;flex-direction:column;gap:11px;animation:fadein .2s ease}
.page.on{display:flex}
@keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.stat{background:var(--s1);border:1px solid var(--b);border-radius:14px;padding:13px;position:relative;overflow:hidden}
.stat-lbl{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px}
.stat-val{font-size:19px;font-weight:800;font-family:var(--mono);letter-spacing:-1px;line-height:1}
.card{background:var(--s1);border:1px solid var(--b);border-radius:14px;padding:13px}
.card-title{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px}
.srch{display:flex;align-items:center;gap:8px;background:var(--s1);border:1px solid var(--b);border-radius:11px;padding:9px 12px}
.srch input{background:none;border:none;outline:none;color:var(--t);font-size:13px;flex:1;font-family:var(--sans)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fi{display:flex;flex-direction:column;gap:4px}
.fi.full{grid-column:1/-1}
.fi label{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:.8px;text-transform:uppercase}
.fi input,.fi select{background:var(--s2);border:1.5px solid var(--b);border-radius:10px;padding:10px 12px;color:var(--t);font-size:13px;font-family:var(--sans);outline:none;width:100%}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 16px;border-radius:11px;font-size:13px;font-weight:700;font-family:var(--sans);cursor:pointer;border:none}
.btn-prim{background:var(--acc);color:#081A0D;box-shadow:0 4px 14px var(--acc-glow);flex:1}
.btn-ghost{background:var(--s2);color:var(--t);border:1px solid var(--b);flex:1}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(5px);z-index:100;display:none;align-items:flex-end;justify-content:center}
.overlay.on{display:flex}
.sheet{background:var(--s1);border:1px solid var(--b);border-radius:22px 22px 0 0;width:100%;max-width:480px;max-height:94vh;overflow-y:auto;padding-bottom:calc(env(safe-area-inset-bottom)+16px)}
.sh-handle{width:36px;height:4px;background:var(--b2);border-radius:2px;margin:11px auto 2px}
.sh-hdr{padding:5px 16px 13px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b)}
.sh-body{padding:14px 16px}
.sh-footer{padding:11px 16px 0;display:flex;gap:8px}

/* Camera Overlay */
#cam-wrap{position:fixed;inset:0;background:#000;z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center}
#cam-wrap.on{display:flex}
.cam-top{position:absolute;top:0;left:0;right:0;padding:14px 16px;display:flex;justify-content:space-between;z-index:1}
.cam-top-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:#fff;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center}
#cam-video{width:100%;max-width:480px;display:block}
.cam-frame{position:relative;width:100%;max-width:480px}
.cor{position:absolute;width:26px;height:26px;border-color:var(--acc);border-style:solid}
.cor.tl{top:6px;left:6px;border-width:3px 0 0 3px}.cor.tr{top:6px;right:6px;border-width:3px 3px 0 0}
.cor.bl{bottom:6px;left:6px;border-width:0 0 3px 3px}.cor.br{bottom:6px;right:6px;border-width:0 3px 3px 0}
.slr{position:absolute;left:6px;right:6px;height:2px;background:var(--acc);box-shadow:0 0 8px var(--acc);animation:scan 2s ease-in-out infinite}
@keyframes scan{0%{top:6px}50%{top:calc(100% - 8px)}100%{top:6px}}
.cam-bottom{position:absolute;bottom:40px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:12px}
.cam-shutter{width:70px;height:70px;border-radius:50%;background:#fff;border:5px solid rgba(255,255,255,.4);cursor:pointer}

/* OCR loading */
#ocr-loading{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(6px);z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.ocr-spin{width:48px;height:48px;border:4px solid var(--b2);border-top-color:var(--acc);border-radius:50%;animation:spinning .8s linear infinite}
@keyframes spinning{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-box">📦</div><h1>Stock<span>Scan</span></h1></div>
  <div class="hdr-right">
    <div class="icon-btn" onclick="openOCRScan()">📷</div>
  </div>
</header>

<div class="main">
  <div class="page on" id="p-dash">
    <div class="stat-grid">
      <div class="stat"><div class="stat-lbl">FATURAS</div><div class="stat-val" id="count-inv">0</div></div>
      <div class="stat"><div class="stat-lbl">ARTIGOS</div><div class="stat-val" id="count-art">0</div></div>
    </div>
    <div class="card" style="margin-top:10px">
      <button class="btn btn-prim" style="width:100%" onclick="openOCRScan()">Digitalizar Fatura</button>
    </div>
  </div>
  
  <div class="page" id="p-inv">
    <div id="inv-list"></div>
  </div>
</div>

<nav class="bot-nav">
  <button class="bn on" onclick="goPage('dash',this)"><span class="bn-ic">◎</span><span class="bn-lbl">Dash</span></button>
  <button class="bn" onclick="goPage('inv',this)"><span class="bn-ic">🧾</span><span class="bn-lbl">Faturas</span></button>
</nav>

<div id="cam-wrap">
  <div class="cam-top"><button class="cam-top-btn" onclick="closeCam()">✕</button></div>
  <div class="cam-frame">
    <video id="cam-video" autoplay playsinline muted></video>
    <canvas id="cam-canvas" style="display:none"></canvas>
    <div class="cor tl"></div><div class="cor tr"></div>
    <div class="cor bl"></div><div class="cor br"></div>
    <div class="slr"></div>
  </div>
  <div class="cam-bottom">
    <p id="cam-hint" style="color:#fff; font-size:12px">Alinhe o QR Code ou os Artigos</p>
    <p id="cam-st" style="color:var(--t3); font-size:10px"></p>
    <button class="cam-shutter" id="cam-shutter" onclick="captureAndOCR()"></button>
  </div>
</div>

<div id="ocr-loading">
  <div class="ocr-spin"></div>
  <p style="color:#fff; text-align:center">🧠 IA a processar fatura...<br><span style="font-size:11px; color:var(--t3)">A ler QR Code e Artigos</span></p>
</div>

<div class="overlay" id="m-invoice">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-hdr"><h3>Confirmar Fatura</h3><button class="sh-close" onclick="closeSheet('m-invoice')">✕</button></div>
    <div class="sh-body">
      <div class="fg" id="inv-form-fields" style="margin-bottom:14px">
          </div>
      <div class="card-title">Artigos Detetados</div>
      <div id="form-items-list"></div>
    </div>
    <div class="sh-footer">
      <button class="btn btn-ghost" onclick="closeSheet('m-invoice')">Cancelar</button>
      <button class="btn btn-prim" onclick="saveData()">✓ Guardar</button>
    </div>
  </div>
</div>

<script>
let stream = null;
let useFront = false;

// NAVEGAÇÃO BÁSICA
function goPage(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
    document.querySelectorAll('.bn').forEach(b => b.classList.remove('on'));
    document.getElementById('p-'+id).classList.add('on');
    el.classList.add('on');
}

function closeSheet(id) { document.getElementById(id).classList.remove('on'); }

// --- LÓGICA DE CÂMARA ---
async function openOCRScan() {
    const wrap = document.getElementById('cam-wrap');
    wrap.classList.add('on');
    document.getElementById('cam-st').innerText = "A iniciar...";
    
    try {
        stream = await navigator.mediaDevices.getUserMedia({
            video: { 
                facingMode: useFront ? "user" : "environment",
                width: { ideal: 1280 },
                height: { ideal: 720 }
            }
        });
        document.getElementById('cam-video').srcObject = stream;
        document.getElementById('cam-shutter').style.display = "block";
        document.getElementById('cam-st').innerText = "Câmara Ativa";
    } catch (err) {
        alert("Erro ao aceder à câmara.");
        closeCam();
    }
}

function closeCam() {
    if(stream) stream.getTracks().forEach(t => t.stop());
    document.getElementById('cam-wrap').classList.remove('on');
}

function switchCam() {
    useFront = !useFront;
    closeCam();
    openOCRScan();
}

// --- O MOTOR DE LEITURA (A TUA CORRECÇÃO) ---
async function captureAndOCR() {
    const video = document.getElementById('cam-video');
    const canvas = document.getElementById('cam-canvas');
    const ctx = canvas.getContext('2d');
    const loader = document.getElementById('ocr-loading');

    // 1. Capturar imagem em alta resolução
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    
    loader.style.display = 'flex';

    try {
        // --- PARTE 1: QR CODE (jsQR) ---
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height);
        let invoiceData = { nif: "", data: "", total: "" };
        
        if (code) {
            console.log("QR Detetado:", code.data);
            invoiceData = parseATQRCode(code.data);
        }

        // --- PARTE 2: ARTIGOS (Tesseract OCR) ---
        // Pré-processamento simples: escala de cinza ajuda o OCR
        const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
        const worker = await Tesseract.createWorker('por');
        const { data: { text } } = await worker.recognize(dataUrl);
        await worker.terminate();

        const items = parseArticles(text);

        // --- PARTE 3: PREENCHER O TEU MODAL ---
        populateModal(invoiceData, items);
        
        loader.style.display = 'none';
        closeCam();
        document.getElementById('m-invoice').classList.add('on');

    } catch (err) {
        console.error(err);
        loader.style.display = 'none';
        alert("Falha no processamento IA.");
    }
}

// Parser do QR Code padrão da AT (Portugal)
function parseATQRCode(data) {
    const p = data.split('*');
    const res = { nif: "", data: "", total: "" };
    p.forEach(part => {
        const [key, val] = part.split(':');
        if(key === 'A') res.nif = val;
        if(key === 'F') res.data = val.substring(0,4)+'-'+val.substring(4,6)+'-'+val.substring(6,8);
        if(key === 'I1') res.total = val;
    });
    return res;
}

// Lógica para extrair linhas de artigos e preços
function parseArticles(text) {
    const lines = text.split('\n');
    const items = [];
    // Regex para procurar valores decimais no fim da linha (ex: 1.50 ou 12,00)
    const priceRegex = /(\d+[.,]\d{2})$/;

    lines.forEach(line => {
        const cleanLine = line.trim();
        const match = cleanLine.match(priceRegex);
        if (match && cleanLine.length > 5) {
            items.push({
                desc: cleanLine.replace(match[0], '').trim(),
                price: match[0].replace(',', '.')
            });
        }
    });
    return items;
}

function populateModal(data, items) {
    const fields = document.getElementById('inv-form-fields');
    const list = document.getElementById('form-items-list');
    
    // Injetar campos de cabeçalho
    fields.innerHTML = `
        <div class="fi full"><label>NIF Fornecedor</label><input type="text" value="${data.nif}"></div>
        <div class="fi"><label>Data</label><input type="date" value="${data.data}"></div>
        <div class="fi"><label>Valor Total (€)</label><input type="number" value="${data.total}"></div>
    `;

    // Injetar lista de artigos
    list.innerHTML = items.length > 0 ? "" : "<p style='color:var(--t3); font-size:12px'>Nenhum artigo extraído.</p>";
    items.forEach(item => {
        const row = document.createElement('div');
        row.style = "display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--b); font-size:13px";
        row.innerHTML = `<span>${item.desc}</span><b style="color:var(--acc)">${item.price}€</b>`;
        list.appendChild(row);
    });
}

function saveData() {
    alert("Dados guardados com sucesso!");
    closeSheet('m-invoice');
}
</script>

</body>
</html>
