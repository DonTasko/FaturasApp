<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>StockScan - Cloud</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ... todo o CSS permanece igual ao anterior ... */
</style>
</head>
<body>
<!-- ... todo o HTML permanece igual ... -->

<div id="toast" class="toast"></div>

<script>
(function() {
  // ═══════════════════════════════════════════════════════════════════════════
  // SUPABASE - inicialização única em escopo isolado
  // ═══════════════════════════════════════════════════════════════════════════
  const SUPABASE_URL = 'https://clhhnzgjcrxezxhvguiy.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_L8_BSQnaKtl0wdlcA645vA__HHhozVn';
  
  // Usar um símbolo único no window para evitar conflitos
  if (!window._stockScanSupabase) {
    window._stockScanSupabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }
  const supabase = window._stockScanSupabase;
  
  // Estado global
  let currentUser = null;
  let invoices = [];
  let articles = [];
  let families = [];
  let alerts = [];
  let userConfig = { biz: '', nif: '', alertPct: 10 };
  let invFilter = 'todas';
  let artFilter = 'todas';
  let formItems = [];
  let editInvId = null;
  let editArtId = null;
  let editFamId = null;
  let camStream = null, camAF = null, camFacing = 'environment', camMode = 'qr';
  
  // ═══════════════════════════════════════════════════════════════════════════
  // AUXILIARES
  // ═══════════════════════════════════════════════════════════════════════════
  function toast(msg, dur=3200, type=''){
    const t=document.getElementById('toast');
    if(!t) return;
    t.textContent=msg;
    t.className='toast'+(type?' toast-'+type:'');
    t.style.display='block';
    clearTimeout(t._t);
    t._t=setTimeout(()=>t.style.display='none',dur);
  }
  function openSheet(id){ document.getElementById(id).classList.add('on'); }
  function closeSheet(id){ document.getElementById(id).classList.remove('on'); }
  const uid = () => Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
  const eur = v => new Intl.NumberFormat('pt-PT',{style:'currency',currency:'EUR'}).format(+v||0);
  const fdate = d => { try{ return new Date(d).toLocaleDateString('pt-PT',{day:'2-digit',month:'short',year:'numeric'}); }catch{ return d||''; } };
  const famById = id => families.find(f=>f.id===id) || { name:'—', icon:'📦', color:'#888' };
  
  // ═══════════════════════════════════════════════════════════════════════════
  // AUTENTICAÇÃO
  // ═══════════════════════════════════════════════════════════════════════════
  window.login = async function() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    if (!email || !password) { toast('Preencha email e password', 'err'); return; }
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) { toast('Erro: ' + error.message, 'err'); return; }
    toast('✅ Login efetuado!');
    await onAuthSuccess(data.user);
  };
  
  window.signup = async function() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    if (!email || !password) { toast('Preencha email e password', 'err'); return; }
    if (password.length < 6) { toast('Password com pelo menos 6 caracteres', 'err'); return; }
    const { data, error } = await supabase.auth.signUp({ email, password });
    if (error) { toast('Erro: ' + error.message, 'err'); return; }
    toast('✅ Conta criada! Verifique o email para confirmar.');
  };
  
  window.logout = async function() {
    await supabase.auth.signOut();
    currentUser = null;
    document.getElementById('login-container').style.display = 'flex';
    document.getElementById('user-info').style.display = 'none';
    document.querySelector('header').style.opacity = '0.5';
    toast('👋 Sessão terminada');
  };
  
  async function onAuthSuccess(user) {
    currentUser = user;
    document.getElementById('login-container').style.display = 'none';
    document.querySelector('header').style.opacity = '1';
    document.getElementById('user-info').style.display = 'flex';
    document.getElementById('user-email').textContent = user.email.split('@')[0];
    await loadUserData();
    renderDash();
    renderInvoiceList();
    renderArticleList();
    renderAlerts();
    renderConfig();
  }
  
  // ═══════════════════════════════════════════════════════════════════════════
  // CARREGAR DADOS
  // ═══════════════════════════════════════════════════════════════════════════
  async function loadUserData() {
    if (!currentUser) return;
    const { data: famData } = await supabase.from('families').select('*').eq('user_id', currentUser.id);
    families = famData || [];
    if (families.length === 0) {
      const defaultFams = [
        { id: 'f1', name: 'Carnes', icon: '🥩', color: '#F87171' },
        { id: 'f2', name: 'Peixe', icon: '🐟', color: '#60A5FA' },
        { id: 'f3', name: 'Laticínios', icon: '🧀', color: '#FACC15' },
        { id: 'f4', name: 'Bebidas', icon: '🍷', color: '#C084FC' },
        { id: 'f5', name: 'Mercearia', icon: '🛒', color: '#4ADE80' },
        { id: 'f6', name: 'Legumes', icon: '🥦', color: '#34D399' },
        { id: 'f7', name: 'Limpeza', icon: '🧹', color: '#94A3B8' },
        { id: 'f8', name: 'Outros', icon: '📦', color: '#FB923C' },
      ];
      for (const fam of defaultFams) {
        await supabase.from('families').insert({ ...fam, user_id: currentUser.id });
      }
      const { data: newFams } = await supabase.from('families').select('*').eq('user_id', currentUser.id);
      families = newFams || [];
    }
    const { data: artData } = await supabase.from('articles').select('*').eq('user_id', currentUser.id);
    const { data: priceData } = await supabase.from('article_prices').select('*').eq('user_id', currentUser.id);
    articles = (artData || []).map(art => ({
      ...art,
      prices: (priceData || []).filter(p => p.article_id === art.id).sort((a,b) => new Date(a.date) - new Date(b.date))
    }));
    const { data: invData } = await supabase.from('invoices').select('*').eq('user_id', currentUser.id);
    const { data: itemData } = await supabase.from('invoice_items').select('*').eq('user_id', currentUser.id);
    invoices = (invData || []).map(inv => ({
      ...inv,
      items: (itemData || []).filter(it => it.invoice_id === inv.id)
    }));
    const { data: alertData } = await supabase.from('price_alerts').select('*').eq('user_id', currentUser.id);
    alerts = alertData || [];
    const { data: settings } = await supabase.from('user_settings').select('*').eq('user_id', currentUser.id).single();
    if (settings) userConfig = { biz: settings.biz_name, nif: settings.nif, alertPct: settings.alert_pct };
  }
  
  // ═══════════════════════════════════════════════════════════════════════════
  // DASHBOARD (resumido, igual ao anterior)
  // ═══════════════════════════════════════════════════════════════════════════
  function renderDash(){
    const tot = invoices.reduce((a,i)=>a+(+i.total||0),0);
    const now=new Date(); const m30=new Date(now); m30.setDate(m30.getDate()-30);
    const inv30=invoices.filter(i=>new Date(i.date)>=m30);
    const tot30=inv30.reduce((a,i)=>a+(+i.total||0),0);
    const unresolvedAlerts=alerts.filter(a=>!a.resolved).length;
    document.getElementById('stat-grid').innerHTML=`
      <div class="stat g"><div class="stat-lbl">Total Gasto</div><div class="stat-val">${eur(tot)}</div><div class="stat-sub">${invoices.length} faturas</div></div>
      <div class="stat b"><div class="stat-lbl">Últimos 30 dias</div><div class="stat-val">${eur(tot30)}</div><div class="stat-sub">${inv30.length} faturas</div></div>
      <div class="stat y"><div class="stat-lbl">Artigos</div><div class="stat-val">${articles.length}</div><div class="stat-sub">${families.length} famílias</div></div>
      <div class="stat ${unresolvedAlerts>0?'r':'g'}"><div class="stat-lbl">Alertas</div><div class="stat-val">${unresolvedAlerts}</div><div class="stat-sub">${unresolvedAlerts?'⚠ preços alterados':'✓ estável'}</div></div>`;
    document.getElementById('dash-scan-btn').innerHTML=`<button class="dash-cam-btn" onclick="openOCRScan()"><span style="font-size:22px">📷</span><div><p style="font-size:13px;font-weight:700;color:var(--t)">Digitalizar Fatura</p><p style="font-size:11px;color:var(--t3);margin-top:1px">Foto + QR + OCR automático</p></div><span style="font-size:18px;color:var(--acc);margin-left:auto">→</span></button>`;
    const dashAlerts=alerts.filter(a=>!a.resolved).slice(0,5);
    const alertsEl=document.getElementById('dash-alerts');
    if(dashAlerts.length){
      alertsEl.innerHTML=`<div class="card-title">⚠ Alertas de preço</div>${dashAlerts.map(a=>`<div class="alert-row"><div class="alert-ico" style="background:${a.direction==='up'?'#F8717118':'#4ADE8018'}">${a.direction==='up'?'📈':'📉'}</div><div style="flex:1;min-width:0"><p style="font-size:12px;font-weight:700">${a.article_name}</p><p style="font-size:10px;color:var(--t3)">${eur(a.old_price)} → ${eur(a.new_price)} <span style="color:${a.direction==='up'?'var(--red)':'var(--acc)'}">(${(a.pct_change>0?'+':'')+a.pct_change.toFixed(1)}%)</span></p></div><button class="btn-resolve" onclick="resolveAlert('${a.id}')">✓</button></div>`).join('')}<button class="btn btn-ghost" style="width:100%;margin-top:8px;font-size:12px" onclick="goPage('alerts',document.getElementById('bn-alerts'))">Ver todos →</button>`;
    } else alertsEl.innerHTML='';
    renderTopArticles();
  }
  function renderTopArticles(){
    const el=document.getElementById('dash-top-art');
    if(!el)return;
    const ranked=articles.map(a=>{ const total=a.prices.reduce((s,p)=>s+(+p.price||0)*(+p.quantity||1),0); const lastPrice=a.prices[a.prices.length-1]?.price||0; return{...a,total,lastPrice}; }).filter(a=>a.prices.length>0).sort((a,b)=>b.total-a.total).slice(0,6);
    if(!ranked.length){el.innerHTML='<p style="font-size:12px;color:var(--t3);text-align:center;padding:10px 0">Sem artigos ainda</p>';return;}
    const mx=ranked[0].total||1;
    el.innerHTML=ranked.map(a=>{ const fam=famById(a.family_id); return`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-size:12px;font-weight:700">${fam.icon} ${a.name}</span><span style="font-size:10px;color:var(--t3)">${eur(a.lastPrice)}/${a.unit||'un'}</span></div><div style="height:4px;background:var(--s3);border-radius:2px"><div style="height:4px;border-radius:2px;background:${fam.color};width:${(a.total/mx*100).toFixed(1)}%"></div></div></div>`; }).join('');
  }
  
  // ═══════════════════════════════════════════════════════════════════════════
  // FATURAS (resumido)
  // ═══════════════════════════════════════════════════════════════════════════
  function renderInvoiceList(){
    const q=(document.getElementById('inv-srch')?.value||'').toLowerCase();
    let list=invoices.filter(i=>{ const ms=!q||(i.supplier||'').toLowerCase().includes(q)||(i.num||'').toLowerCase().includes(q); const mf=invFilter==='todas'||i.status===invFilter; return ms&&mf; }).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const wrap=document.getElementById('inv-list');
    if(!list.length){wrap.innerHTML=`<div class="empty"><div class="ei">🧾</div><p>${invoices.length?'Sem resultados.':'Nenhuma fatura ainda.'}</p></div>`;return;}
    const groups={};
    list.forEach(i=>{ const d=i.date?new Date(i.date):new Date(); const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); const lbl=d.toLocaleDateString('pt-PT',{month:'long',year:'numeric'}); if(!groups[k])groups[k]={lbl,items:[]}; groups[k].items.push(i); });
    wrap.innerHTML=Object.keys(groups).sort((a,b)=>b.localeCompare(a)).map(k=>`<div class="month-hdr">${groups[k].lbl}</div><div class="gap8">${groups[k].items.map(inv=>`<div class="exp-item" onclick="showInvoiceDetail('${inv.id}')"><div class="exp-ico" style="background:var(--acc-dim)">${inv.photo?'📷':'🧾'}</div><div class="exp-mid"><div class="exp-name">${inv.supplier||'Sem fornecedor'}</div><div class="exp-meta">${inv.num||'—'} · ${fdate(inv.date)} · ${inv.items?.length||0} artigos</div></div><div class="exp-r"><div class="exp-val">${eur(inv.total)}</div><div class="pill ${inv.status==='enviada'?'pill-ok':'pill-pend'}">${inv.status==='enviada'?'✓ enviada':'⏳ pendente'}</div></div></div>`).join('')}</div>`).join('');
  }
  window.showInvoiceDetail = async function(id){
    const inv=invoices.find(i=>i.id===id); if(!inv)return;
    document.getElementById('d-inv-num').textContent=inv.num||'Fatura';
    const photoSection=inv.photo?`<div style="border-radius:12px;overflow:hidden;border:1px solid var(--b);margin-bottom:14px;max-height:200px"><img src="${inv.photo}" style="width:100%;display:block;object-fit:cover;max-height:200px"></div>`:'';
    const itemsSection=inv.items?.length?`<div class="card-title" style="margin-bottom:8px">Artigos (${inv.items.length})</div>${inv.items.map(it=>{const fam=famById(it.family_id);return`<div style="display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid var(--b)"><span style="font-size:16px">${fam.icon}</span><div style="flex:1"><p style="font-size:12px;font-weight:700">${it.name}</p><p style="font-size:10px;color:var(--t3)">${it.quantity} ${it.unit} × ${eur(it.unit_price)}</p></div><span style="font-size:12px;font-weight:700">${eur(it.total_price)}</span></div>`}).join('')}`:'<div class="empty" style="padding:12px"><p>Sem artigos</p></div>';
    document.getElementById('d-inv-body').innerHTML=`${photoSection}<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">${[['Fornecedor',inv.supplier||'—'],['NIF',inv.nif||'—'],['Data',fdate(inv.date)],['Total',eur(inv.total)],['IVA',eur(inv.vat)],['ATCUD',inv.atcud||'—']].map(([l,v])=>`<div style="background:var(--s2);border-radius:10px;padding:10px"><div style="font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;margin-bottom:3px">${l}</div><div style="font-size:12px;font-weight:600">${v}</div></div>`).join('')}</div>${itemsSection}`;
    const footer=document.getElementById('d-inv-footer');
    footer.innerHTML='';
    const del=document.createElement('button');del.className='btn btn-danger';del.textContent='🗑';del.style.flex='0';del.style.padding='11px 14px';
    del.onclick=async()=>{if(!confirm('Eliminar fatura?'))return; await supabase.from('invoices').delete().eq('id',id); invoices=invoices.filter(i=>i.id!==id); closeSheet('m-invdetail'); toast('🗑 Eliminada'); renderDash(); renderInvoiceList(); };
    const edit=document.createElement('button');edit.className='btn btn-ghost';edit.textContent='✏️ Editar';
    edit.onclick=()=>{ closeSheet('m-invdetail'); openInvoiceForm(inv); };
    footer.appendChild(del); footer.appendChild(edit);
    if(inv.status==='pendente'){
      const sb=document.createElement('button');sb.className='btn btn-prim';sb.textContent='📤';sb.style.flex='0';sb.style.padding='11px 14px';
      sb.onclick=async()=>{ await supabase.from('invoices').update({status:'enviada'}).eq('id',id); inv.status='enviada'; closeSheet('m-invdetail'); renderInvoiceList(); renderDash(); toast('📤 Marcada enviada!'); };
      footer.appendChild(sb);
    }
    openSheet('m-invdetail');
  };
  function renderInvFilterChips(){ document.getElementById('inv-filter-chips').innerHTML=['todas','pendente','enviada'].map(f=>`<div class="chip ${invFilter===f?'on':''}" onclick="setInvFilter('${f}')">${f}</div>`).join(''); }
  window.setInvFilter = function(f){ invFilter=f; renderInvFilterChips(); renderInvoiceList(); };
  
  // ═══════════════════════════════════════════════════════════════════════════
  // ARTIGOS (resumido)
  // ═══════════════════════════════════════════════════════════════════════════
  function renderArticleList(){
    const q=(document.getElementById('art-srch')?.value||'').toLowerCase();
    let list=articles.filter(a=>{ const ms=!q||(a.name||'').toLowerCase().includes(q); const mf=artFilter==='todas'||a.family_id===artFilter; return ms&&mf; }).sort((a,b)=>a.name.localeCompare(b.name));
    const wrap=document.getElementById('art-list');
    if(!list.length){wrap.innerHTML=`<div class="empty"><div class="ei">📦</div><p>${articles.length?'Sem resultados.':'Nenhum artigo ainda.'}</p></div>`;return;}
    wrap.innerHTML=list.map(art=>{ const fam=famById(art.family_id); const lastPrice=art.prices[art.prices.length-1]?.price||0; return`<div class="exp-item" onclick="showArticleDetail('${art.id}')"><div class="exp-ico" style="background:${fam.color}18">${fam.icon}</div><div class="exp-mid"><div class="exp-name">${art.name}</div><div class="exp-meta">${fam.name} · ${art.prices.length} compras</div></div><div class="exp-r"><div class="exp-val">${eur(lastPrice)}/${art.unit||'un'}</div></div></div>`; }).join('');
  }
  window.showArticleDetail = function(id){
    const art=articles.find(a=>a.id===id); if(!art)return;
    const fam=famById(art.family_id);
    document.getElementById('d-art-name').textContent=art.name;
    document.getElementById('d-art-body').innerHTML=`
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <div style="width:44px;height:44px;border-radius:12px;background:${fam.color}22;display:flex;align-items:center;justify-content:center;font-size:22px">${fam.icon}</div>
        <div><p style="font-size:13px;font-weight:700">${fam.name}</p><p style="font-size:11px;color:var(--t3)">${art.unit||'un'} · ${art.prices.length} compras</p></div>
        <button class="btn btn-ghost" style="flex:0;margin-left:auto;padding:8px 12px;font-size:12px" onclick="editArticle('${id}')">✏️ Editar</button>
      </div>
      <div class="card-title" style="margin-bottom:8px">Histórico de preços</div>
      ${[...art.prices].reverse().slice(0,10).map(p=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--b)"><span style="font-size:11px;color:var(--t3)">${fdate(p.date)}</span><div style="display:flex;align-items:center;gap:8px"><span style="font-size:10px;color:var(--t3)">${p.quantity||1} ${art.unit||'un'}</span><span style="font-size:13px;font-weight:700">${eur(p.price)}</span></div></div>`).join('')}`;
    openSheet('m-artdetail');
  };
  window.editArticle = function(id){
    const art=articles.find(a=>a.id===id); if(!art)return;
    document.getElementById('ea-name').value=art.name||'';
    document.getElementById('ea-unit').value=art.unit||'un';
    document.getElementById('ea-ean').value=art.ean||'';
    document.getElementById('ea-fam-grid').innerHTML=families.map(f=>`<div class="fam-pick-opt ${art.family_id===f.id?'sel':''}" onclick="setEditArtFam('${id}','${f.id}',this)" style="border-color:${art.family_id===f.id?f.color:'var(--b)'}"><span style="font-size:18px">${f.icon}</span><span style="font-size:10px;font-weight:700">${f.name}</span></div>`).join('');
    editArtId=id;
    closeSheet('m-artdetail');
    openSheet('m-editart');
  };
  window.setEditArtFam = function(artId,famId,el){
    document.querySelectorAll('#ea-fam-grid .fam-pick-opt').forEach(e=>{e.classList.remove('sel');e.style.borderColor='var(--b)';});
    const fam=famById(famId);el.classList.add('sel');el.style.borderColor=fam.color;
    const art=articles.find(a=>a.id===artId);if(art)art.family_id=famId;
  };
  window.saveArticleEdit = async function(){
    const art=articles.find(a=>a.id===editArtId); if(!art)return;
    art.name=document.getElementById('ea-name').value.trim()||art.name;
    art.unit=document.getElementById('ea-unit').value.trim()||'un';
    art.ean=document.getElementById('ea-ean').value.trim();
    await supabase.from('articles').update({name:art.name, unit:art.unit, ean:art.ean, family_id:art.family_id}).eq('id',art.id);
    closeSheet('m-editart');
    renderArticleList();
    toast('✅ Artigo actualizado!');
    editArtId=null;
  };
  function renderArtFilterChips(){ const opts=[{id:'todas',name:'Todas',icon:''},...families]; document.getElementById('art-filter-chips').innerHTML=opts.map(f=>`<div class="chip ${artFilter===f.id?'on':''}" onclick="setArtFilter('${f.id}')">${f.icon} ${f.name}</div>`).join(''); }
  window.setArtFilter = function(f){ artFilter=f; renderArtFilterChips(); renderArticleList(); };
  
  // ═══════════════════════════════════════════════════════════════════════════
  // ALERTAS, CONFIGURAÇÕES, FORMULÁRIO FATURA (resumido)
  // ═══════════════════════════════════════════════════════════════════════════
  window.resolveAlert = async function(id){ await supabase.from('price_alerts').update({resolved:true}).eq('id',id); const a=alerts.find(x=>x.id===id); if(a)a.resolved=true; renderAlerts(); renderDash(); toast('✓ Alerta resolvido'); };
  window.resolveAllAlerts = async function(){ await supabase.from('price_alerts').update({resolved:true}).eq('user_id',currentUser.id); alerts.forEach(a=>a.resolved=true); renderAlerts(); renderDash(); toast('✓ Todos os alertas resolvidos'); };
  function renderAlerts(){ const list=alerts.filter(a=>!a.resolved).slice(0,50); const wrap=document.getElementById('alerts-list'); if(!list.length){wrap.innerHTML=`<div class="empty"><div class="ei">✅</div><p>Sem alertas de variação de preço.</p></div>`;return;} wrap.innerHTML=list.map(a=>`<div class="alert-row"><div class="alert-ico" style="background:${a.direction==='up'?'#F8717118':'#4ADE8018'}">${a.direction==='up'?'📈':'📉'}</div><div style="flex:1"><p style="font-size:13px;font-weight:700">${a.article_name}</p><p style="font-size:10px;color:var(--t3)">${eur(a.old_price)} → ${eur(a.new_price)} · ${fdate(a.date)}</p></div><div><span style="font-size:12px;font-weight:800;color:${a.direction==='up'?'var(--red)':'var(--acc)'}">${(a.pct_change>0?'+':'')+a.pct_change.toFixed(1)}%</span><button class="btn-resolve" onclick="resolveAlert('${a.id}')">✓</button></div></div>`).join(''); }
  function renderConfig(){ document.getElementById('cfg-biz').value=userConfig?.biz||''; document.getElementById('cfg-nif').value=userConfig?.nif||''; document.getElementById('cfg-alert-pct').value=userConfig?.alertPct||10; document.getElementById('cfg-counts').textContent=`${invoices.length} faturas · ${articles.length} artigos · ${alerts.filter(a=>!a.resolved).length} alertas activos`; renderFamilyList(); }
  function renderFamilyList(){ document.getElementById('fam-list').innerHTML=families.map(f=>`<div class="cat-row"><div class="cat-row-ico">${f.icon}</div><div class="cat-row-info"><p>${f.name}</p><span style="color:${f.color}">⬤</span></div><button class="cat-del-btn" onclick="editFamily('${f.id}')">✏️</button><button class="cat-del-btn" onclick="deleteFamily('${f.id}')">🗑</button></div>`).join(''); }
  window.saveCfg = async function(){ userConfig = { biz: document.getElementById('cfg-biz').value.trim(), nif: document.getElementById('cfg-nif').value.trim(), alertPct: parseFloat(document.getElementById('cfg-alert-pct').value)||10 }; await supabase.from('user_settings').upsert({ user_id: currentUser.id, biz_name: userConfig.biz, nif: userConfig.nif, alert_pct: userConfig.alertPct, updated_at: new Date() }); toast('✅ Configurações guardadas!'); };
  window.openAddFamily = function(){ editFamId=null; document.getElementById('m-fam-title').textContent='Nova Família'; document.getElementById('fam-name').value=''; document.getElementById('fam-icon').value=''; document.getElementById('fam-color').value='#4ADE80'; openSheet('m-family'); };
  window.editFamily = function(id){ const f=families.find(x=>x.id===id); if(!f)return; editFamId=id; document.getElementById('m-fam-title').textContent='Editar Família'; document.getElementById('fam-name').value=f.name; document.getElementById('fam-icon').value=f.icon; document.getElementById('fam-color').value=f.color; openSheet('m-family'); };
  window.saveFamily = async function(){ const name=document.getElementById('fam-name').value.trim(); const icon=document.getElementById('fam-icon').value.trim()||'📦'; const color=document.getElementById('fam-color').value; if(!name){toast('⚠ Insira um nome','err');return;} if(editFamId){ const idx=families.findIndex(f=>f.id===editFamId); if(idx>=0) families[idx]={...families[idx],name,icon,color}; await supabase.from('families').update({name,icon,color}).eq('id',editFamId); } else { const newId='f'+uid(); families.push({id:newId,name,icon,color,user_id:currentUser.id}); await supabase.from('families').insert({id:newId,name,icon,color,user_id:currentUser.id}); } closeSheet('m-family'); renderFamilyList(); renderArticleList(); toast(editFamId?'✏️ Família actualizada!':'✅ Família adicionada!'); editFamId=null; };
  window.deleteFamily = async function(id){ if(articles.some(a=>a.family_id===id)&&!confirm('Esta família tem artigos. Eliminar mesmo assim?'))return; families=families.filter(f=>f.id!==id); await supabase.from('families').delete().eq('id',id); renderFamilyList(); toast('🗑 Família eliminada'); };
  window.exportData = function(){ const data={ invoices, articles, families, alerts, config:userConfig, exportedAt:new Date().toISOString() }; const blob=new Blob([JSON.stringify(data)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='stockscan_backup_'+new Date().toISOString().slice(0,10)+'.json'; a.click(); URL.revokeObjectURL(a.href); toast('📤 Backup exportado!'); };
  window.openInvoiceForm = function(data){ editInvId=data?.id||null; formItems=data?.items?.map(i=>({...i,id:i.id||uid()}))||[]; document.getElementById('m-inv-title').textContent=editInvId?'Editar Fatura':'Nova Fatura'; const fields=[['Fornecedor','fi-sup','text',data?.supplier||'','full'],['NIF Fornecedor','fi-nif','text',data?.nif||'',''],['Nº Fatura','fi-num','text',data?.num||'',''],['Data','fi-date','date',data?.date||new Date().toISOString().slice(0,10),''],['Total (€)','fi-total','number',data?.total||'',''],['IVA (€)','fi-vat','number',data?.vat||'',''],['ATCUD','fi-atcud','text',data?.atcud||'','full']]; const photoSection=data?.photo?`<div class="fi full"><label>FOTO DA FATURA</label><img src="${data.photo}" style="width:100%;border-radius:11px;max-height:180px;object-fit:cover"></div>`:''; document.getElementById('inv-form-fields').innerHTML=photoSection+fields.map(([lbl,id,type,val,span])=>`<div class="fi ${span}"><label>${lbl}</label><input type="${type}" id="${id}" value="${val}" ${type==='number'?'step="0.01" inputmode="decimal"':''}></div>`).join(''); if(data?.photo) document.getElementById('inv-form-fields').dataset.photo=data.photo; renderFormItems(); document.getElementById('save-inv-btn').onclick=saveInvoice; openSheet('m-invoice'); };
  function renderFormItems(){ const wrap=document.getElementById('form-items-list'); if(!formItems.length){wrap.innerHTML=`<div style="text-align:center;padding:16px;color:var(--t3);font-size:12px">Sem artigos. Adicione manualmente.</div>`;return;} wrap.innerHTML=formItems.map((item,i)=>{ const fam=famById(item.famId); return`<div class="form-item-row"><div class="fir-left"><div class="fir-fam" style="background:${fam.color}22;color:${fam.color}" onclick="editItemFamily('${item.id}')">${fam.icon}</div><div class="fir-info"><div style="font-size:12px;font-weight:700">${item.name||'Artigo'}</div><div style="font-size:10px;color:var(--t3)">${item.qty||1} ${item.unit||'un'} × ${eur(item.unitPrice||0)}</div></div></div><div style="display:flex;align-items:center;gap:7px"><span style="font-size:12px;font-weight:700">${eur(item.totalPrice||0)}</span><button class="btn-icon-sm" onclick="removeFormItem('${item.id}')">🗑</button></div></div>`; }).join(''); }
  window.removeFormItem = function(id){ formItems=formItems.filter(i=>i.id!==id); renderFormItems(); };
  window.openAddItemManual = function(){ openSheet('m-additem'); };
  window.calcItemTotal = function(){ const qty=parseFloat(document.getElementById('ai-qty')?.value)||1; const up=parseFloat(document.getElementById('ai-price')?.value)||0; const tot=document.getElementById('ai-total'); if(tot&&up>0)tot.value=(qty*up).toFixed(2); };
  window.saveFormItem = function(){ const g=id=>document.getElementById(id)?.value?.trim()||''; const qty=parseFloat(g('ai-qty'))||1; const unitPrice=parseFloat(g('ai-price'))||0; const totalPrice=parseFloat(g('ai-total'))||qty*unitPrice; const item={ id:uid(), name:g('ai-name'), qty, unit:g('ai-unit'), unitPrice, totalPrice, vatRate:parseFloat(g('ai-vatrate'))||23, famId:'' }; if(!item.name){toast('⚠ Insira o nome do artigo','err');return;} formItems.push(item); renderFormItems(); closeSheet('m-additem'); toast('✅ Artigo adicionado'); };
  window.editItemFamily = function(itemId){ const item=formItems.find(i=>i.id===itemId); if(!item)return; document.getElementById('fam-picker-target').value=itemId; document.getElementById('fam-picker-grid').innerHTML=families.map(f=>`<div class="fam-pick-opt ${item.famId===f.id?'sel':''}" onclick="setItemFam('${itemId}','${f.id}',this)" style="border-color:${item.famId===f.id?f.color:'var(--b)'}"><span style="font-size:20px">${f.icon}</span><span style="font-size:11px;font-weight:700">${f.name}</span></div>`).join(''); openSheet('m-fampicker'); };
  window.setItemFam = function(itemId,famId,el){ const item=formItems.find(i=>i.id===itemId); if(item)item.famId=famId; document.querySelectorAll('.fam-pick-opt').forEach(e=>{e.classList.remove('sel');e.style.borderColor='var(--b)';}); const fam=famById(famId); el.classList.add('sel');el.style.borderColor=fam.color; renderFormItems(); setTimeout(()=>closeSheet('m-fampicker'),300); };
  window.saveInvoice = async function(){ const g=id=>document.getElementById(id)?.value?.trim()||''; const photo=document.getElementById('inv-form-fields')?.dataset?.photo||null; const inv={ id:editInvId||uid(), supplier:g('fi-sup'), nif:g('fi-nif'), num:g('fi-num'), date:g('fi-date'), total:parseFloat(g('fi-total'))||0, vat:parseFloat(g('fi-vat'))||0, atcud:g('fi-atcud'), photo, status:'pendente', user_id:currentUser.id }; await supabase.from('invoices').upsert(inv); await supabase.from('invoice_items').delete().eq('invoice_id',inv.id); for(const item of formItems){ await supabase.from('invoice_items').insert({ id:item.id||uid(), invoice_id:inv.id, name:item.name, quantity:item.qty, unit:item.unit, unit_price:item.unitPrice, total_price:item.totalPrice, vat_rate:item.vatRate, family_id:item.famId, user_id:currentUser.id }); } if(editInvId){ const idx=invoices.findIndex(i=>i.id===editInvId); if(idx>=0) invoices[idx]={...inv,items:formItems}; } else invoices.unshift({...inv,items:formItems}); closeSheet('m-invoice'); formItems=[]; editInvId=null; renderDash(); renderInvoiceList(); toast('✅ Fatura guardada!'); };
  
  // ═══════════════════════════════════════════════════════════════════════════
  // CÂMARA E OCR (simplificado)
  // ═══════════════════════════════════════════════════════════════════════════
  window.openOCRScan = function(){ camMode='ocr'; document.getElementById('cam-wrap').classList.add('on'); document.getElementById('cam-shutter').style.display='flex'; document.getElementById('cam-hint').textContent='Fotografe a fatura completa'; document.getElementById('cam-st').textContent='Posicione a fatura no ecrã'; startCam(); };
  async function startCam(){ stopCam(); const v=document.getElementById('cam-video'),st=document.getElementById('cam-st'); try{ camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:camFacing}}); v.srcObject=camStream; await v.play(); st.textContent='📷 Pronto'; }catch(e){ st.textContent='❌ Câmara inacessível'; } }
  function stopCam(){ if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;} }
  window.closeCam = function(){ stopCam(); document.getElementById('cam-wrap').classList.remove('on'); };
  window.switchCam = function(){ camFacing=camFacing==='environment'?'user':'environment'; startCam(); };
  window.captureAndOCR = function(){ toast('📷 Função OCR em desenvolvimento...', 2000); closeCam(); };
  window.openImportFile = function(){ toast('📂 Importação disponível na versão web', 2000); };
  window.qrChoicePhoto = function(){ closeSheet('m-qr-choice'); toast('📷 OCR em breve', 2000); };
  window.qrChoiceDirect = function(){ closeSheet('m-qr-choice'); toast('✏️ Preencha manualmente', 2000); };
  window.confirmImport = function(){ closeSheet('m-import-review'); toast('✅ Importação concluída', 2000); };
  window.goPage = function(id,btn){ document.querySelectorAll('.page').forEach(p=>p.classList.remove('on')); document.getElementById('p-'+id).classList.add('on'); document.querySelectorAll('.bn').forEach(b=>b.classList.remove('on')); if(btn)btn.classList.add('on'); document.getElementById('main-scroll').scrollTop=0; if(id==='dash') renderDash(); if(id==='inv') renderInvoiceList(); if(id==='art') renderArticleList(); if(id==='alerts') renderAlerts(); if(id==='cfg') renderConfig(); };
  
  // ═══════════════════════════════════════════════════════════════════════════
  // INICIALIZAÇÃO
  // ═══════════════════════════════════════════════════════════════════════════
  supabase.auth.getSession().then(({ data: { session } }) => {
    if(session?.user) onAuthSuccess(session.user);
    else { document.getElementById('login-container').style.display = 'flex'; document.querySelector('header').style.opacity = '0.5'; }
  });
  supabase.auth.onAuthStateChange((event, session) => {
    if(session?.user) onAuthSuccess(session.user);
    else if(event === 'SIGNED_OUT') { currentUser=null; document.getElementById('login-container').style.display='flex'; document.getElementById('user-info').style.display='none'; document.querySelector('header').style.opacity='0.5'; }
  });
  renderInvFilterChips();
  renderArtFilterChips();
})();
</script>
</body>
