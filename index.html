<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>StockScan</title>
<style>

</head>
<body>

<!-- TODO O HTML DO BODY (header, pages, nav, camera, modals) - mantido igual ao teu original -->
<!-- (para não ficar gigante aqui, assumo que já tens esta parte. Se quiseres posso enviar também, mas o importante agora é o script) -->

<div id="toast" class="toast"></div>

<script>
// ====================== jsQR LIBRARY (mantido) ======================
/* (cole aqui o código completo do jsQR que já tinhas - o que começa com (function webpackUniversalModuleDefinition... ) */

// ====================== FUNÇÕES AUXILIARES (OBRIGATÓRIAS) ======================
function vib(){if('vibrate' in navigator) navigator.vibrate(50);}

function openSheet(id){
  const el = document.getElementById(id);
  if(el) el.classList.add('on');
}

function closeSheet(id){
  const el = document.getElementById(id);
  if(el) el.classList.remove('on');
}

function toast(msg, type = ''){
  const t = document.getElementById('toast');
  if(!t) return;
  t.textContent = msg;
  if(type === 'err') t.classList.add('toast-err');
  else t.classList.remove('toast-err');
  t.style.display = 'block';
  setTimeout(()=>{ t.style.display = 'none'; }, 2800);
}

function goPage(page, btn){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  const pageEl = document.getElementById('p-' + page);
  if(pageEl) pageEl.classList.add('on');
  document.querySelectorAll('.bn').forEach(b => b.classList.remove('on'));
  if(btn) btn.classList.add('on');
}

// ====================== RESTO DO TEU CÓDIGO DA APP ======================
// (aqui vai todo o teu código original de variáveis, funções, renderDash, etc.)

// === FUNÇÕES DA CÂMARA CORRIGIDAS ===
function openOCRScan(){
  camMode = 'ocr';
  document.getElementById('cam-wrap').classList.add('on');
  document.getElementById('cam-shutter').style.display = 'flex';
  document.getElementById('cam-hint').textContent = 'Fotografe a fatura completa (QR Code + IA)';
  document.getElementById('cam-st').textContent = 'Posicione a fatura no ecrã';
  startCam();
}

async function captureAndOCR(){
  // (código completo que te passei antes - com QR + IA)
  const v = document.getElementById('cam-video');
  const c = document.getElementById('cam-canvas');
  c.width = v.videoWidth; c.height = v.videoHeight;
  const ctx = c.getContext('2d'); ctx.drawImage(v,0,0);

  let qrParsed = null;
  try{
    const imageData = ctx.getImageData(0,0,c.width,c.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height, {inversionAttempts:'attemptBoth'});
    if(code && code.data) qrParsed = parseAT(code.data);
  }catch(e){}

  const maxW=1600; let w=c.width, h=c.height;
  if(w>maxW){h=Math.round(h*maxW/w); w=maxW;}
  const c2=document.createElement('canvas'); c2.width=w; c2.height=h;
  c2.getContext('2d').drawImage(c,0,0,w,h);
  const photoDataUrl = c2.toDataURL('image/jpeg',0.85);

  closeCam();
  showOCRLoading(true);
  toast('🧠 A analisar fatura com IA + QR Code...', 30000);

  try{
    const ocrResult = await callClaudeOCR(photoDataUrl);
    showOCRLoading(false);
    let finalData = ocrResult || {items:[], supplier:'', nif:'', num:'', date:'', total:0, vat:0, atcud:''};
    if(qrParsed){
      finalData.nif = qrParsed.nif || finalData.nif || '';
      finalData.num = qrParsed.num || finalData.num || '';
      finalData.date = qrParsed.date || finalData.date || new Date().toISOString().slice(0,10);
      finalData.total = qrParsed.total !== undefined ? qrParsed.total : finalData.total;
      finalData.atcud = qrParsed.atcud || finalData.atcud || '';
      finalData.source = 'ocr+qr';
    }
    finalData.photo = photoDataUrl;
    openInvoiceForm(finalData);
    toast(qrParsed ? '✅ QR Code + Artigos lidos!' : '✅ Fatura analisada com IA!');
  }catch(e){
    showOCRLoading(false);
    toast('⚠ Erro na análise. Tente novamente ou use manual.','err');
    openInvoiceForm({photo:photoDataUrl, items:[], source:'manual'});
  }
}

// INIT
loadData();
renderDash();
renderInvFilterChips();
renderArtFilterChips();
renderConfig();
</script>
</body>
</html>
