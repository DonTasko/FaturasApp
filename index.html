<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StockScan Free OCR</title>
    
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <style>
        /* CSS INTEGRAL PRESERVADO */
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{
            --bg:#0C0D10;--s1:#13141A;--s2:#1B1C24;--s3:#22232E;
            --b:#2A2B3A;--b2:#383A4E;
            --t:#ECEDF5;--t2:#9496B0;--t3:#55566E;
            --acc:#4ADE80;--acc2:#22C55E;--acc-dim:#4ADE8015;--acc-glow:#4ADE8040;
            --warn:#FACC15;--red:#F87171;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
        }
        body{background:var(--bg);color:var(--t);font-family:var(--sans);display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;overflow:hidden}
        
        header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b)}
        .logo{display:flex;align-items:center;gap:9px}
        .logo-box{width:32px;height:32px;background:var(--acc);border-radius:9px;display:flex;align-items:center;justify-content:center}
        
        .main{flex:1;overflow-y:auto;padding:15px;padding-bottom:100px}
        .page{display:none;flex-direction:column;gap:12px}
        .page.on{display:flex}

        /* Botões e Inputs */
        .btn{padding:12px;border-radius:12px;border:none;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
        .btn-prim{background:var(--acc);color:#000}
        .btn-ghost{background:var(--s2);color:var(--t);border:1px solid var(--b)}
        
        .card{background:var(--s1);border:1px solid var(--b);border-radius:14px;padding:13px;margin-bottom:10px}
        
        /* Camera UI */
        #cam-wrap{position:fixed;inset:0;background:#000;z-index:200;display:none;flex-direction:column}
        #cam-wrap.on{display:flex}
        #cam-video{width:100%;height:70%;object-fit:cover}
        .cam-controls{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px;background:var(--bg)}

        /* Loading */
        #loading{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:1000}
        .spinner{width:40px;height:40px;border:4px solid var(--b);border-top-color:var(--acc);border-radius:50%;animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* Bot Nav */
        nav{position:fixed;bottom:0;width:100%;max-width:480px;display:flex;background:var(--s1);border-top:1px solid var(--b);padding-bottom:env(safe-area-inset-bottom)}
        .bn{flex:1;padding:12px;text-align:center;background:none;border:none;color:var(--t3);font-size:10px;font-weight:bold}
        .bn.on{color:var(--acc)}
    </style>
</head>
<body>

<header>
    <div class="logo"><div class="logo-box">📦</div><h1>Stock<span>Scan</span></h1></div>
    <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" onclick="openImportFile()">📂</button>
        <button class="btn btn-prim" onclick="openCam()">📷</button>
    </div>
</header>

<div class="main">
    <div id="p-dash" class="page on">
        <div class="card">
            <h3>Bem-vindo</h3>
            <p style="color:var(--t2);font-size:13px">Digitalize uma fatura para começar.</p>
        </div>
        <button class="btn btn-prim" onclick="openCam()" style="width:100%">📷 Digitalizar Agora</button>
        <button class="btn btn-ghost" onclick="openImportFile()" style="width:100%">🖼️ Escolher da Galeria</button>
        
        <div class="card" style="margin-top:20px">
            <h4>Resumo Recente</h4>
            <div id="summary-list" style="font-size:12px;margin-top:10px">Nenhum dado guardado.</div>
        </div>
    </div>
</div>

<nav>
    <button class="bn on" onclick="showPage('dash')">INÍCIO</button>
    <button class="bn" onclick="showPage('inv')">FATURAS</button>
    <button class="bn" onclick="showPage('art')">ARTIGOS</button>
</nav>

<div id="cam-wrap">
    <video id="cam-video" autoplay playsinline></video>
    <canvas id="cam-canvas" style="display:none"></canvas>
    <div class="cam-controls">
        <p id="cam-msg">Aponte para o QR Code ou tire foto</p>
        <button class="btn btn-prim" style="width:80px;height:80px;border-radius:50%" onclick="capturePhoto()">📸</button>
        <button class="btn btn-ghost" onclick="closeCam()">Fechar</button>
    </div>
</div>

<div id="loading">
    <div class="spinner"></div>
    <p style="margin-top:15px" id="load-msg">A processar imagem...</p>
</div>

<script>
    // --- ESTADO ---
    let stream = null;
    let invoices = JSON.parse(localStorage.getItem('ss_inv') || '[]');

    function showPage(p) {
        document.querySelectorAll('.page').forEach(el => el.classList.remove('on'));
        document.getElementById('p-' + p).classList.add('on');
    }

    // --- CÂMARA ---
    async function openCam() {
        document.getElementById('cam-wrap').classList.add('on');
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            document.getElementById('cam-video').srcObject = stream;
            scanQRCode(); // Inicia scanner de QR em background
        } catch (err) {
            alert("Erro ao abrir câmara: " + err);
            closeCam();
        }
    }

    function closeCam() {
        if(stream) stream.getTracks().forEach(t => t.stop());
        document.getElementById('cam-wrap').classList.remove('on');
    }

    // --- LEITOR QR CODE (JSQR) ---
    function scanQRCode() {
        if(!stream) return;
        const video = document.getElementById('cam-video');
        const canvas = document.getElementById('cam-canvas');
        const ctx = canvas.getContext('2d');

        if(video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imgData.data, imgData.width, imgData.height);

            if(code) {
                processRawData(code.data, "QR Code");
                closeCam();
                return;
            }
        }
        requestAnimationFrame(scanQRCode);
    }

    // --- IMPORTAÇÃO DE FICHEIROS ---
    function openImportFile() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (re) => processOCR(re.target.result);
            reader.readAsDataURL(file);
        };
        input.click();
    }

    function capturePhoto() {
        const video = document.getElementById('cam-video');
        const canvas = document.getElementById('cam-canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const dataUrl = canvas.toDataURL('image/jpeg');
        closeCam();
        processOCR(dataUrl);
    }

    // --- MOTOR OCR GRATUITO (TESSERACT.JS) ---
    async function processOCR(imageData) {
        const load = document.getElementById('loading');
        const msg = document.getElementById('load-msg');
        load.style.display = 'flex';
        msg.innerText = "IA a ler texto (pode demorar)...";

        try {
            // Tesseract processa em Português
            const result = await Tesseract.recognize(imageData, 'por');
            processRawData(result.data.text, "OCR");
        } catch (err) {
            alert("Erro no OCR: " + err);
        } finally {
            load.style.display = 'none';
        }
    }

    // --- PARSER DE DADOS ---
    function processRawData(text, source) {
        console.log("Dados extraídos:", text);
        
        // Lógica simples de extração de valores (RegEx)
        const totalMatch = text.match(/(TOTAL|VALOR|A PAGAR).*?(\d+[.,]\d{2})/i);
        const nifMatch = text.match(/[59]\d{8}/); // NIFs em PT começam por 5 ou 9
        
        const info = {
            id: Date.now(),
            date: new Date().toLocaleDateString(),
            total: totalMatch ? totalMatch[2] : "0.00",
            nif: nifMatch ? nifMatch[0] : "Desconhecido",
            source: source
        };

        invoices.push(info);
        localStorage.setItem('ss_inv', JSON.stringify(invoices));
        updateUI();
        alert(`Sucesso! Detetado Total: ${info.total}€ via ${source}`);
    }

    function updateUI() {
        const list = document.getElementById('summary-list');
        if(invoices.length === 0) return;
        list.innerHTML = invoices.slice(-3).reverse().map(inv => `
            <div style="border-bottom:1px solid #222; padding:5px 0">
                <b>${inv.date}</b> - ${inv.total}€ (NIF: ${inv.nif})
            </div>
        `).join('');
    }

    window.onload = updateUI;
</script>

</body>
</html>
