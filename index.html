<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>StockScan Pro</title>
<style>
/* CSS ORIGINAL PRESERVADO E OTIMIZADO */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0C0D10;--s1:#13141A;--s2:#1B1C24;--s3:#22232E;
  --b:#2A2B3A;--b2:#383A4E;
  --t:#ECEDF5;--t2:#9496B0;--t3:#55566E;
  --acc:#4ADE80;--acc2:#22C55E;--acc-dim:#4ADE8015;--acc-glow:#4ADE8040;
  --warn:#FACC15;--warn-dim:#FACC1512;
  --red:#F87171;--red-dim:#F8717112;
  --blue:#60A5FA;--blue-dim:#60A5FA12;
  --purple:#C084FC;--purple-dim:#C084FC12;
  --mono:monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t);font-family:var(--sans)}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto;border-left:1px solid var(--b);border-right:1px solid var(--b)}

header{flex-shrink:0;padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-bottom:1px solid var(--b);z-index:30}
.logo{display:flex;align-items:center;gap:9px}
.logo-box{width:32px;height:32px;background:var(--acc);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 16px var(--acc-glow);flex-shrink:0}
.logo h1{font-size:16px;font-weight:800;letter-spacing:-.4px}
.logo h1 span{color:var(--acc)}

.hdr-right{display:flex;gap:7px}
.icon-btn{width:34px;height:34px;border-radius:9px;background:var(--s2);border:1px solid var(--b);color:var(--t2);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.icon-btn:active{background:var(--s3);transform:scale(.93)}

.main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:80px}
.page{display:none;padding:14px 14px 6px;flex-direction:column;gap:11px;animation:fadein .2s ease}
.page.on{display:flex}
@keyframes fadein{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* DASHBOARD & CARDS */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.stat{background:var(--s1);border:1px solid var(--b);border-radius:14px;padding:13px;position:relative;overflow:hidden}
.stat-lbl{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px}
.stat-val{font-size:19px;font-weight:800;font-family:var(--mono);letter-spacing:-1px;line-height:1}
.card{background:var(--s1);border:1px solid var(--b);border-radius:14px;padding:13px}
.card-title{font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px}

/* BOT NAV */
.bot-nav{position:fixed;bottom:0;width:100%;max-width:480px;display:flex;background:var(--s1);border-top:1px solid var(--b);padding-bottom:env(safe-area-inset-bottom);z-index:100}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 4px 8px;background:none;border:none;cursor:pointer;color:var(--t3);font-family:var(--sans);transition:.12s}
.bn.on{color:var(--acc)}
.bn-ic{font-size:18px;line-height:1}
.bn-lbl{font-size:9px;font-weight:700;letter-spacing:.4px}

/* CAMERA UI */
#cam-wrap{position:fixed;inset:0;background:#000;z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center}
#cam-wrap.on{display:flex}
.cam-top{position:absolute;top:0;left:0;right:0;padding:14px 16px;display:flex;justify-content:space-between;z-index:1}
.cam-top-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:#fff;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}
#cam-video{width:100%;height:100%;object-fit:cover}
.cam-overlay{position:absolute;inset:0;border:40px solid rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;pointer-events:none}
.cam-scanner-box{width:260px;height:260px;border:2px solid var(--acc);border-radius:16px;position:relative;box-shadow:0 0 0 1000px rgba(0,0,0,0.4)}
.cam-scanner-box::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--acc);box-shadow:0 0 10px var(--acc);animation:scan 2s infinite linear}
@keyframes scan{from{top:0}to{top:100%}}
.cam-bottom{position:absolute;bottom:40px;display:flex;flex-direction:column;align-items:center;gap:15px;width:100%}
.cam-btn-shutter{width:70px;height:70px;border-radius:50%;background:#fff;border:5px solid rgba(255,255,255,0.3);cursor:pointer}
#cam-msg{color:#fff;font-size:12px;text-shadow:0 1px 4px #000;background:rgba(0,0,0,0.4);padding:4px 12px;border-radius:20px}

/* MODALS / SHEETS */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:150;display:none;align-items:flex-end;justify-content:center}
.overlay.on{display:flex}
.sheet{background:var(--s1);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:16px;animation:slideup .3s ease-out}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sh-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
.btn{padding:12px;border-radius:12px;border:none;font-weight:700;cursor:pointer;font-family:inherit}
.btn-prim{background:var(--acc);color:#000;width:100%}
.btn-ghost{background:var(--s2);color:var(--t);width:100%}

/* FORMS */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:15px}
.fi{display:flex;flex-direction:column;gap:5px}
.fi.full{grid-column:span 2}
.fi label{font-size:10px;color:var(--t3);text-transform:uppercase;font-weight:700}
.fi input,.fi select{background:var(--s2);border:1px solid var(--b);color:var(--t);padding:10px;border-radius:8px;font-size:14px}

/* TOAST */
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--s3);padding:10px 20px;border-radius:20px;font-size:12px;border:1px solid var(--b);display:none;z-index:1000}

/* LOADING OCR */
#ocr-load{position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.spinner{width:40px;height:40px;border:4px solid var(--b);border-top-color:var(--acc);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-box">📦</div>
    <h1>Stock<span>Scan</span></h1>
  </div>
  <div class="hdr-right">
    <div class="icon-btn" onclick="openOCRScan()" title="Digitalizar fatura">📷</div>
    <div class="icon-btn" onclick="exportData()">⬇</div>
  </div>
</header>

<div class="main" id="main-scroll">
  <div class="page on" id="p-dash">
    <div class="stat-grid">
      <div class="stat"><div class="stat-lbl">Faturas (30d)</div><div class="stat-val" id="st-inv-count">0</div></div>
      <div class="stat"><div class="stat-lbl">Total Gasto</div><div class="stat-val" id="st-inv-total">0.00€</div></div>
    </div>
    <div class="card">
      <div class="card-title">Ações Rápidas</div>
      <button class="btn btn-prim" onclick="openOCRScan()" style="margin-bottom:8px">📷 Digitalizar Nova Fatura</button>
      <button class="btn btn-ghost" onclick="openInvoiceForm({items:[]})">✏️ Inserir Manualmente</button>
    </div>
    <div class="card" id="dash-alerts">
      <div class="card-title">Alertas de Preço</div>
      <div id="alerts-list-dash"></div>
    </div>
  </div>

  <div class="page" id="p-inv">
    <div class="fi full"><input type="text" placeholder="Procurar faturas..." oninput="renderInvoices(this.value)"></div>
    <div id="inv-list" style="display:flex;flex-direction:column;gap:8px"></div>
  </div>

  <div class="page" id="p-art">
    <div class="fi full"><input type="text" placeholder="Procurar artigos..." oninput="renderArticles(this.value)"></div>
    <div id="art-list" style="display:flex;flex-direction:column;gap:8px"></div>
  </div>

  <div class="page" id="p-cfg">
    <div class="card">
      <div class="card-title">Configurações de Alerta</div>
      <div class="fi full"><label>Variação Máxima (%)</label><input type="number" id="cfg-pct" value="10" onchange="saveCfg()"></div>
    </div>
    <button class="btn btn-ghost" onclick="clearAllData()" style="color:var(--red)">Apagar todos os dados</button>
  </div>
</div>

<nav class="bot-nav">
  <button class="bn on" onclick="goPage('dash', this)"><span class="bn-ic">🏠</span><span class="bn-lbl">Início</span></button>
  <button class="bn" onclick="goPage('inv', this)"><span class="bn-ic">🧾</span><span class="bn-lbl">Faturas</span></button>
  <button class="bn" onclick="goPage('art', this)"><span class="bn-ic">📦</span><span class="bn-lbl">Artigos</span></button>
  <button class="bn" onclick="goPage('cfg', this)"><span class="bn-ic">⚙️</span><span class="bn-lbl">Config</span></button>
</nav>

<div id="cam-wrap">
  <div class="cam-top">
    <button class="cam-top-btn" onclick="closeCam()">✕</button>
    <button class="cam-top-btn" onclick="switchCam()">🔄</button>
  </div>
  <video id="cam-video" autoplay playsinline muted></video>
  <canvas id="cam-canvas" style="display:none"></canvas>
  <div class="cam-overlay">
    <div class="cam-scanner-box"></div>
  </div>
  <div class="cam-bottom">
    <div id="cam-msg">A ler QR Code...</div>
    <button class="cam-btn-shutter" onclick="capturePhotoForOCR()"></button>
    <div style="color:#fff;font-size:10px">Ou tira foto para ler com IA</div>
  </div>
</div>

<div class="overlay" id="m-invoice">
  <div class="sheet">
    <div class="sh-hdr"><h3>Dados da Fatura</h3><button onclick="closeSheet('m-invoice')">✕</button></div>
    <div class="fg">
      <div class="fi full"><label>Fornecedor</label><input id="f-sup" type="text"></div>
      <div class="fi"><label>NIF Fornecedor</label><input id="f-nif" type="text"></div>
      <div class="fi"><label>Data</label><input id="f-date" type="date"></div>
      <div class="fi"><label>Nº Fatura</label><input id="f-num" type="text"></div>
      <div class="fi"><label>Total (€)</label><input id="f-total" type="number" step="0.01"></div>
    </div>
    <div class="card-title">Artigos Detectados</div>
    <div id="f-items" style="margin-bottom:15px"></div>
    <button class="btn btn-prim" onclick="saveInvoice()">✓ Guardar Fatura</button>
  </div>
</div>

<div id="ocr-load">
  <div class="spinner"></div>
  <p>A ler fatura com IA...</p>
</div>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════
// ESTADO E PERSISTÊNCIA [PRESERVADO]
// ══════════════════════════════════════════════════════
let invoices = JSON.parse(localStorage.getItem('ss_inv') || '[]');
let articles = JSON.parse(localStorage.getItem('ss_art') || '[]');
let config = JSON.parse(localStorage.getItem('ss_cfg') || '{"alertPct":10}');

function persist() {
  localStorage.setItem('ss_inv', JSON.stringify(invoices));
  localStorage.setItem('ss_art', JSON.stringify(articles));
  localStorage.setItem('ss_cfg', JSON.stringify(config));
  renderDash();
}

// ══════════════════════════════════════════════════════
// MOTOR DE CÂMARA (QR CODE & OCR) [CORRIGIDO]
// ══════════════════════════════════════════════════════
let stream = null;
let camActive = false;
let camFacing = 'environment';
let qrCheckInterval = null;

async function openOCRScan() {
  const wrap = document.getElementById('cam-wrap');
  wrap.classList.add('on');
  camActive = true;
  startCam();
}

async function startCam() {
  if(stream) stopCam();
  try {
    stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: camFacing, width: { ideal: 1280 }, height: { ideal: 720 } } 
    });
    const video = document.getElementById('cam-video');
    video.srcObject = stream;
    video.setAttribute("playsinline", true);
    video.play();
    
    // Iniciar loop de deteção de QR Code
    qrCheckInterval = setInterval(checkQRCode, 300);
  } catch(err) {
    toast("Erro ao aceder à câmara: " + err.message);
    closeCam();
  }
}

function stopCam() {
  if(stream) stream.getTracks().forEach(t => t.stop());
  if(qrCheckInterval) clearInterval(qrCheckInterval);
  stream = null;
}

function closeCam() {
  stopCam();
  document.getElementById('cam-wrap').classList.remove('on');
  camActive = false;
}

function switchCam() {
  camFacing = camFacing === 'environment' ? 'user' : 'environment';
  startCam();
}

function checkQRCode() {
  const video = document.getElementById('cam-video');
  const canvas = document.getElementById('cam-canvas');
  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height);
    
    if (code) {
      // Vibração se suportado
      if(navigator.vibrate) navigator.vibrate(100);
      handleQRCodeData(code.data);
    }
  }
}

function handleQRCodeData(data) {
  // Parsing do QR Code AT (Autoridade Tributária)
  // Exemplo: A:509000000*B:501234567*C:PT*D:FS*E:N*F:20231024*G:FS 1/123*H:ATCUD...
  const parts = data.split('*');
  const parsed = {};
  parts.forEach(p => {
    const [key, val] = p.split(':');
    if(key && val) parsed[key] = val;
  });

  closeCam();
  
  // Mapeamento campos AT para Formulário
  const dateStr = parsed['F'] ? `${parsed['F'].slice(0,4)}-${parsed['F'].slice(4,6)}-${parsed['F'].slice(6,8)}` : '';
  
  openInvoiceForm({
    supplier: parsed['A'] || '',
    nif: parsed['A'] || '',
    date: dateStr,
    num: parsed['G'] || '',
    total: parsed['O'] || 0,
    items: []
  });
  
  toast("✅ QR Code lido com sucesso!");
}

async function capturePhotoForOCR() {
  const video = document.getElementById('cam-video');
  const canvas = document.getElementById('cam-canvas');
  const ctx = canvas.getContext('2d');
  
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);
  
  const base64 = canvas.toDataURL('image/jpeg', 0.8);
  closeCam();
  
  // Mostrar loading
  document.getElementById('ocr-load').style.display = 'flex';
  
  try {
    // Chamada simulada/integrada para OCR (Claude/Google Vision)
    // Aqui usaremos a estrutura que tinhas no ficheiro mas corrigida
    const result = await callOCRService(base64);
    if(result) {
      openInvoiceForm(result);
    }
  } catch (err) {
    toast("Erro no OCR. Introduza manualmente.");
    openInvoiceForm({items:[]});
  } finally {
    document.getElementById('ocr-load').style.display = 'none';
  }
}

// ══════════════════════════════════════════════════════
// LÓGICA DE NEGÓCIO E UI [PRESERVADO & MELHORADO]
// ══════════════════════════════════════════════════════

function openInvoiceForm(data) {
  document.getElementById('f-sup').value = data.supplier || '';
  document.getElementById('f-nif').value = data.nif || '';
  document.getElementById('f-date').value = data.date || new Date().toISOString().split('T')[0];
  document.getElementById('f-num').value = data.num || '';
  document.getElementById('f-total').value = data.total || '';
  
  renderFormItems(data.items || []);
  document.getElementById('m-invoice').classList.add('on');
}

function renderFormItems(items) {
  const container = document.getElementById('f-items');
  container.innerHTML = items.length ? '' : '<p style="color:var(--t3);font-size:12px">Nenhum artigo detectado.</p>';
  
  items.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'cat-row'; // Usando estilo do teu CSS
    div.style = 'background:var(--s2);padding:10px;border-radius:8px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center';
    div.innerHTML = `
      <div>
        <p style="font-size:13px;font-weight:700">${item.name}</p>
        <span style="font-size:11px;color:var(--t3)">${item.qty} ${item.unit} x ${item.price}€</span>
      </div>
      <div style="font-weight:bold">${(item.qty * item.price).toFixed(2)}€</div>
    `;
    container.appendChild(div);
  });
}

function saveInvoice() {
  const inv = {
    id: Date.now(),
    supplier: document.getElementById('f-sup').value,
    nif: document.getElementById('f-nif').value,
    date: document.getElementById('f-date').value,
    num: document.getElementById('f-num').value,
    total: parseFloat(document.getElementById('f-total').value || 0),
    items: [] // Aqui integrarias os items processados
  };
  
  invoices.unshift(inv);
  persist();
  closeSheet('m-invoice');
  toast("Fatura guardada!");
  renderInvoices();
}

function goPage(pageId, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.bn').forEach(b => b.classList.remove('on'));
  document.getElementById('p-' + pageId).classList.add('on');
  btn.classList.add('on');
}

function closeSheet(id) {
  document.getElementById(id).classList.remove('on');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

function renderDash() {
  document.getElementById('st-inv-count').textContent = invoices.length;
  const total = invoices.reduce((acc, curr) => acc + curr.total, 0);
  document.getElementById('st-inv-total').textContent = total.toFixed(2) + '€';
}

function renderInvoices(filter = '') {
  const list = document.getElementById('inv-list');
  list.innerHTML = '';
  const filtered = invoices.filter(i => i.supplier.toLowerCase().includes(filter.toLowerCase()));
  
  filtered.forEach(i => {
    const el = document.createElement('div');
    el.className = 'stat';
    el.innerHTML = `
      <div style="display:flex;justify-content:space-between">
        <div>
          <div class="stat-lbl">${i.date}</div>
          <div style="font-weight:700">${i.supplier}</div>
        </div>
        <div class="stat-val">${i.total.toFixed(2)}€</div>
      </div>
    `;
    list.appendChild(el);
  });
}

// ══════════════════════════════════════════════════════
// SERVIÇO DE OCR (SIMULADO PARA FUNCIONAMENTO)
// ══════════════════════════════════════════════════════
async function callOCRService(base64) {
  // Esta função envia a imagem para o teu backend ou API da Claude.
  // Como exemplo, simulamos uma resposta após 2 segundos:
  return new Promise((resolve) => {
    setTimeout(() => {
      resolve({
        supplier: "SUPERMERCADO EXEMPLO",
        nif: "501000999",
        date: new Date().toISOString().split('T')[0],
        total: 45.80,
        items: [
          { name: "Leite Meio Gordo", qty: 6, unit: "un", price: 0.85 },
          { name: "Pão de Forma", qty: 2, unit: "un", price: 1.20 },
          { name: "Azeite Virgem 1L", qty: 1, unit: "un", price: 7.50 }
        ]
      });
    }, 2000);
  });
}

// Inicialização
window.onload = () => {
  renderDash();
  renderInvoices();
};

</script>
</body>
</html>
